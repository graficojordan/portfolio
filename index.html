<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordán Trinch - Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Space Grotesk"', 'sans-serif'] },
                    colors: { neutral: { 900: '#171717', 800: '#262626' } }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #050505; 
            color: #e5e5e5; 
            margin: 0; 
            overflow-x: hidden;
            cursor: none; 
        }

        a, button, .interactive-trigger, .project-card-trigger, .archive-item {
            cursor: none !important;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .marquee-container { 
            display: flex;
            overflow: hidden; 
            white-space: nowrap; 
            width: 100vw;
        }
        .marquee-content { 
            flex-shrink: 0;
            display: flex; 
            animation: marquee 25s linear infinite; 
        }
        @keyframes marquee { 
            0% { transform: translateX(0); } 
            100% { transform: translateX(-50%); } 
        }

        .custom-cursor { 
            mix-blend-mode: difference; 
            pointer-events: none; 
            z-index: 9999;
            position: fixed;
            top: 0; 
            left: 0;
            background-color: white;
            border-radius: 50%;
        }

        .interactive-text { cursor: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin-text { animation: spin 10s linear infinite; }

        @media (pointer: coarse) {
            .custom-cursor { display: none !important; }
            body, a, button, .interactive-trigger, .project-card-trigger, .archive-item, iframe { cursor: auto !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;
        const { motion, useScroll, useTransform, useMotionValue, useSpring, AnimatePresence } = Motion;

        const ArrowDown = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>);
        const ArrowUpRight = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>);
        const Mail = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>);
        
        const Behance = ({ size = 24, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
                <path d="M7.7 12.3h2.2c1.2 0 2.2-.6 2.2-2 0-1.1-.6-1.7-2-1.7H7.7v3.7zM7.7 15.6h2.5c1.4 0 2.5-.6 2.5-2.1 0-1.4-.9-2-2.2-2H7.7v4.1zM5.5 6.4h4.8c2.6 0 4.3 1.2 4.3 3.7 0 1.5-.8 2.6-2 3.1 1.5.4 2.7 1.4 2.7 3.5 0 2.7-2 4.1-4.8 4.1H5.5V6.4z M16.5 10.1h4.6v-1.4h-4.6v1.4zM19 14.8c-1.2 0-1.9-.6-2.1-1.6h4.6c0-2.3-1.3-3.8-3.7-3.8-2.5 0-3.9 1.7-3.9 4.3 0 2.6 1.6 4.2 4.3 4.2 2 0 3.6-1 4-2.7h-2.1c-.3.9-1.1 1.5-1.1 1.5z"/>
            </svg>
        );

        const Linkedin = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>);
        const Disc = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>);

        const CustomCursor = () => {
            const cursorX = useMotionValue(-100);
            const cursorY = useMotionValue(-100);
            
            const springConfig = { damping: 28, stiffness: 500, mass: 0.5 };
            const x = useSpring(cursorX, springConfig);
            const y = useSpring(cursorY, springConfig);
            
            const [isHovering, setIsHovering] = useState(false);
            const isHoveringRef = useRef(false);

            useEffect(() => {
                const moveCursor = (e) => {
                    const offset = isHoveringRef.current ? 32 : 8;
                    cursorX.set(e.clientX - offset);
                    cursorY.set(e.clientY - offset);
                };

                const handleMouseEnter = () => {
                    setIsHovering(true);
                    isHoveringRef.current = true;
                };
                
                const handleMouseLeave = () => {
                    setIsHovering(false);
                    isHoveringRef.current = false;
                };

                window.addEventListener('mousemove', moveCursor);
                
                const interactiveSelectors = 'a, button, .project-card-trigger, .archive-item, .interactive-trigger, iframe';
                
                const addListeners = () => {
                    document.querySelectorAll(interactiveSelectors).forEach(el => {
                        el.addEventListener('mouseenter', handleMouseEnter);
                        el.addEventListener('mouseleave', handleMouseLeave);
                    });
                };

                setTimeout(addListeners, 500);

                const observer = new MutationObserver(addListeners);
                observer.observe(document.body, { childList: true, subtree: true });

                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    observer.disconnect();
                };
            }, []);

            return (
                <motion.div
                    className="custom-cursor"
                    style={{ x, y }}
                    animate={{ width: isHovering ? 64 : 16, height: isHovering ? 64 : 16, opacity: 1 }}
                    transition={{ type: "spring", stiffness: 500, damping: 28, mass: 0.5 }}
                />
            );
        };

        const SpinningBadge = () => (
            <div className="relative w-24 h-24 md:w-32 md:h-32 flex items-center justify-center">
                <svg className="w-full h-full spin-text" viewBox="0 0 100 100">
                    <path id="circlePath" d="M 50, 50 m -37, 0 a 37,37 0 1,1 74,0 a 37,37 0 1,1 -74,0" fill="transparent" />
                    <text fill="white" fontSize="11" fontWeight="bold" letterSpacing="2">
                        <textPath href="#circlePath" startOffset="0%">
                           BASED   IN    ROSAGASARIO — ARG —
                        </textPath>
                    </text>
                </svg>
                <ArrowDown className="absolute text-white" size={24} />
            </div>
        );

        const NebulaText = ({ text, justify = "justify-start", className = "", delayOffset = 0 }) => {
            const chars = text.split("");

            return (
                <motion.div 
                    initial="hidden"
                    whileInView="visible"
                    whileHover="hover"
                    viewport={{ once: false, margin: "-50px" }}
                    className={`flex ${justify} w-full interactive-trigger`}
                >
                    {chars.map((char, i) => {
                        const dx = Math.sin((i + 1) * 1.2) * 120; 
                        const dy = Math.cos((i + 1) * 1.5) * 120;
                        
                        return (
                            <motion.span
                                key={i}
                                className={`inline-block ${className}`}
                                variants={{
                                    hidden: { 
                                        opacity: 0, filter: 'blur(20px)', x: dx, y: dy, scale: 0.2,
                                        transition: { duration: 0.8, ease: "easeOut" }
                                    },
                                    visible: { 
                                        opacity: 1, filter: 'blur(0px)', x: 0, y: 0, scale: 1,
                                        transition: { duration: 1.2, ease: [0.22, 1, 0.36, 1], delay: delayOffset + (i * 0.05) }
                                    },
                                    hover: { 
                                        opacity: 0.5, filter: 'blur(8px)', x: dx * 0.15, y: dy * 0.15, scale: 1.05,
                                        transition: { duration: 0.4, ease: "easeOut" }
                                    }
                                }}
                            >
                                {char === " " ? "\u00A0" : char}
                            </motion.span>
                        );
                    })}
                </motion.div>
            );
        };

        const ImageModal = ({ image, onClose }) => {
            if (!image) return null;

            return (
                <AnimatePresence>
                    <motion.div 
                        initial={{ opacity: 0 }}
                        animate={{ opacity: 1 }}
                        exit={{ opacity: 0 }}
                        className="fixed inset-0 z-[200] bg-black/95 flex items-center justify-center cursor-none"
                        onClick={onClose}
                    >
                        <div className="absolute top-6 right-6 md:top-12 md:right-12 z-50 mix-blend-difference">
                            <button className="interactive-trigger text-white text-xs md:text-sm uppercase tracking-widest font-bold hover:text-neutral-400 transition-colors">
                                [ CERRAR ]
                            </button>
                        </div>
                        <div className="w-full h-full flex items-center justify-center p-4 md:p-12">
                            <img 
                                src={image} 
                                alt="Vista ampliada" 
                                className="max-w-full max-h-full object-contain md:hover:scale-[1.5] transition-transform duration-500 cursor-none" 
                                onClick={(e) => e.stopPropagation()} 
                            />
                        </div>
                    </motion.div>
                </AnimatePresence>
            );
        };

        const ProjectModal = ({ project, onClose }) => {
            if (!project) return null;

            return (
                <motion.div 
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    className="fixed inset-0 z-[100] bg-[#050505] overflow-y-auto cursor-none"
                >
                    <div className="sticky top-0 w-full flex justify-end px-6 py-6 md:px-12 md:py-8 z-50 mix-blend-difference">
                        <button 
                            onClick={onClose} 
                            className="interactive-trigger text-white text-xs md:text-sm uppercase tracking-widest font-bold hover:text-neutral-400 transition-colors"
                        >
                            [ CERRAR ]
                        </button>
                    </div>

                    <div className="px-4 md:px-12 pt-12 pb-16 max-w-[1920px] mx-auto">
                        <h2 className="text-4xl md:text-8xl font-bold tracking-tighter text-white uppercase">{project.title}</h2>
                        <p className="text-sm md:text-base uppercase tracking-widest text-neutral-500 mt-2 md:mt-4">{project.category}</p>
                    </div>

                    {project.content && (
                        <div className="w-full flex flex-col">
                            <div className="w-full">
                                <img src={project.content.images[0]} alt={`${project.title} 1`} className="w-full h-auto block" />
                            </div>

                            <div className="w-full px-6 py-24 md:py-32 flex justify-center bg-[#050505]">
                                <div className="max-w-3xl w-full text-left">
                                    <p className="text-neutral-300 text-lg md:text-2xl leading-relaxed font-light">
                                        {project.content.text}
                                    </p>
                                </div>
                            </div>

                            {project.content.video && (
                                <div className="w-full pb-16 md:pb-24 px-4 md:px-0 flex justify-center">
                                    <div className="w-full">
                                        <video 
                                            src={project.content.video} 
                                            autoPlay 
                                            loop 
                                            muted 
                                            playsInline 
                                            controls
                                            className="w-full h-auto block"
                                        />
                                    </div>
                                </div>
                            )}

                            <div className="w-full flex flex-col gap-4 md:gap-8 pb-32">
                                {project.content.images.slice(1).map((img, i) => (
                                    <div key={i} className="w-full">
                                        <img src={img} alt={`${project.title} ${i+2}`} loading="lazy" className="w-full h-auto block" />
                                    </div>
                                ))}
                            </div>
                            
                            <div className="w-full flex flex-col items-center gap-6 pb-32">
                                {project.content.link && (
                                    <a href={project.content.link} target="_blank" rel="noopener noreferrer" className="interactive-trigger text-white text-sm uppercase tracking-widest hover:text-neutral-400 transition-colors border-b border-white hover:border-neutral-400 pb-1">
                                        VER MÁS
                                    </a>
                                )}
                                <button onClick={onClose} className="interactive-trigger text-neutral-500 text-xs md:text-sm uppercase tracking-widest hover:text-white transition-colors border-b border-neutral-800 hover:border-white pb-1">
                                    VOLVER
                                </button>
                            </div>
                        </div>
                    )}
                </motion.div>
            );
        };

        const ProjectCard = ({ project, index, onClick }) => {
            const [isTouch, setIsTouch] = useState(false);

            useEffect(() => {
                setIsTouch(window.matchMedia("(pointer: coarse)").matches);
            }, []);

            const imageUrl = project.image.includes('unsplash') 
                ? `${project.image}&w=800&q=80` 
                : project.image;

            const handleClick = () => {
                if (project.externalLink) {
                    window.open(project.externalLink, '_blank', 'noopener,noreferrer');
                } else if (onClick && project.content) {
                    onClick(project);
                }
            };

            return (
                <motion.div 
                    initial={{ opacity: 0, y: 50 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    transition={{ duration: 0.6, delay: index * 0.1 }}
                    onClick={handleClick}
                    className="project-card-trigger group relative w-full aspect-[4/5] overflow-hidden bg-neutral-900 border border-neutral-900 hover:border-neutral-700 transition-colors"
                >
                    <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500 z-10"></div>
                    <motion.img 
                        src={imageUrl} 
                        alt={project.title} 
                        loading="lazy"
                        initial={isTouch ? { filter: "grayscale(100%)" } : {}}
                        whileInView={isTouch ? { filter: "grayscale(0%)" } : {}}
                        viewport={{ margin: "-35% 0px -35% 0px", once: false }}
                        className={`w-full h-full object-cover scale-100 group-hover:scale-105 transition-all duration-700 ease-out ${!isTouch ? 'grayscale group-hover:grayscale-0' : ''}`}
                    />
                    <div className="absolute bottom-0 left-0 w-full p-6 z-20 translate-y-4 group-hover:translate-y-0 transition-transform duration-500 bg-gradient-to-t from-black/80 to-transparent">
                        <div className="flex justify-between items-end overflow-hidden">
                            <div>
                                <p className="text-xs uppercase tracking-widest text-neutral-400 mb-1">{project.category}</p>
                                <h3 className="text-2xl md:text-3xl font-bold text-white">{project.title}</h3>
                            </div>
                            <div className="opacity-0 group-hover:opacity-100 transition-opacity duration-300 transform translate-x-4 group-hover:translate-x-0 text-white">
                                <ArrowUpRight className="w-8 h-8" />
                            </div>
                        </div>
                    </div>
                </motion.div>
            );
        };

        const CategorySection = ({ title, projects, onProjectClick }) => (
            <div className="mb-16 md:mb-32 last:mb-0">
                <div className="flex items-end justify-between mb-8 md:mb-12 border-b border-neutral-800 pb-4">
                    <h2 className="text-3xl md:text-6xl font-bold tracking-tighter text-white uppercase">{title}</h2>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-8 md:gap-y-12 gap-x-8">
                    {projects.map((project, index) => (
                        <ProjectCard 
                            key={index} 
                            project={project} 
                            index={index} 
                            onClick={project.content ? onProjectClick : null} 
                        />
                    ))}
                </div>
            </div>
        );

        const ArchiveItem = ({ item, isExpanded, onToggle, onImageClick }) => (
            <div className="border-b border-neutral-900 hover:border-neutral-700 transition-colors">
                <div 
                    className="archive-item group flex flex-col md:flex-row md:items-center justify-between py-4 cursor-none gap-2 md:gap-0"
                    onClick={onToggle}
                >
                    <div className="flex items-center gap-4">
                        <div className="p-2 bg-neutral-900 rounded-full text-neutral-500 group-hover:text-white transition-colors">
                            {isExpanded ? <ArrowDown size={16}/> : <Disc size={16} />}
                        </div>
                        <div>
                            <h4 className="text-sm font-bold text-neutral-300 group-hover:text-white transition-colors">{item.title}</h4>
                            <p className="text-[10px] uppercase tracking-widest text-neutral-600">{item.category}</p>
                        </div>
                    </div>
                    <span className="text-[10px] md:text-xs text-neutral-500 font-mono text-left md:text-right pl-12 md:pl-0">{item.role}</span>
                </div>
                
                <motion.div 
                    initial={false}
                    animate={{ height: isExpanded ? 'auto' : 0, opacity: isExpanded ? 1 : 0 }}
                    className="overflow-hidden"
                >
                    {isExpanded && item.youtube && (
                        <div className="pb-8 pt-2 w-full max-w-4xl mx-auto">
                            <div className="relative w-full aspect-video bg-neutral-900 rounded-lg overflow-hidden">
                                <iframe 
                                    className="absolute top-0 left-0 w-full h-full"
                                    src={`https://www.youtube.com/embed/${item.youtube}`} 
                                    title={item.title}
                                    frameBorder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowFullScreen
                                ></iframe>
                            </div>
                        </div>
                    )}
                    {isExpanded && item.image && (
                        <div className="pb-8 pt-2 w-full max-w-4xl mx-auto">
                            <div 
                                className="relative w-full h-[400px] md:h-[600px] bg-[#0a0a0a] cursor-none flex items-center justify-center group/img overflow-hidden rounded-lg border border-neutral-800"
                                onClick={(e) => { e.stopPropagation(); onImageClick(item.image); }}
                            >
                                <img src={item.image} alt={item.title} className="max-h-full w-auto object-contain scale-100 group-hover/img:scale-105 transition-transform duration-500" />
                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover/img:opacity-100 transition-opacity flex items-center justify-center">
                                    <span className="text-white text-xs uppercase tracking-widest border border-white px-4 py-2 bg-black/50 backdrop-blur-sm">Ampliar Imagen</span>
                                </div>
                            </div>
                        </div>
                    )}
                </motion.div>
            </div>
        );

        function App() {
            const [activeProject, setActiveProject] = useState(null);
            const [expandedArchiveIndex, setExpandedArchiveIndex] = useState(null);
            const [fullscreenImage, setFullscreenImage] = useState(null);

            useEffect(() => {
                if (activeProject || fullscreenImage) {
                    document.body.style.overflow = 'hidden';
                } else {
                    document.body.style.overflow = '';
                }
                return () => { document.body.style.overflow = ''; };
            }, [activeProject, fullscreenImage]);

            const identityProjects = [
                { 
                    title: "CUYACÍ", 
                    category: "Identidad / Packaging", 
                    image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/cuyaci-0.jpg",
                    content: {
                        link: "https://www.behance.net/gallery/233285105/Cuyaci-Diseno-de-packaging",
                        text: "Con Cuyací, el desafío fue proyectar un sistema de packaging que dialogue con la raíz sin anclarse en el pasado, traduciendo lo ancestral a una escala masiva. El eje del proyecto es una identidad de impronta manual desarrollada a partir de grabados en madera, que aportan la crudeza y el gesto orgánico que el producto exigía. Buscamos una armonía sistémica abierta donde cada pieza conserva su singularidad y combina narrativas que desbordan el envase a través de experiencias audiovisuales.",
                        video: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/CUYACI_FN.mp4",
                        images: [
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/cuyaci-1.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/cuyaci-2.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/cuyaci-4.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/cuyaci-5.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/cuyaci-6.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/cuyaci-7.jpg"
                        ]
                    }
                },
                { 
                    title: "MANGIA FRESCO", 
                    category: "Identidad / Manual de marca", 
                    image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-0.jpg",
                    content: {
                        link: "https://www.behance.net/gallery/192867745/Mangia-Fresco-Manual-de-marca",
                        text: "Mangia Fresco es una fábrica de pastas boutique en el corazón de Barrio Martin. El proyecto consistió en transformar la imagen clásica del rubro en una estética depurada de elementos invasivos. La lógica del sistema fue diseñada para mezclar lo tradicional y lo premium, apuntando a un target que valora los detalles curados del mundo gastro de especialidad y la jerarquía de la producción nacional.",
                        images: [
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-1.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-2.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-3.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-4.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-5.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-6.jpg"
                        ]
                    }
                }
            ];
            
            const webProjects = [
                { title: "FORBICE CONSTRUCCIONES", category: "Web / CORPORATIVO", image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/web-forbice.jpg", externalLink: "https://forbice.github.io/web/" },
                { title: "LABCELL", category: "RRSS / CORPORATIVO", image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/web-labcell.jpg", externalLink: "https://www.behance.net/gallery/192872247/Labcell-Identidad" },
            ];
            
            const editorialProjects = [
                { title: "GHETTOS", category: "Diseño de Vinilo", image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/arte-ghettos.jpg", externalLink: "https://www.behance.net/gallery/232421181/Album-vinilo-LP-Portatiles-Steady-Club" },
                { title: "TAPAS DE DISCOS", category: "Sistemas Visuales", image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/arte-tapas.jpg", externalLink: "https://www.behance.net/gallery/213669553/Diseno-de-sistemas-Tapas-de-discos" },
                { title: "COSQUÍN ROCK", category: "Diseño de Información", image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/arte-cosquin.jpg", externalLink: "https://www.behance.net/gallery/212012521/Cosquin-Rock-Diseno-de-informacion" },

                { title: "Debut", category: "EP — ZG", role: "Arte de tapa", image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/tapa-debut.jpg" },
            ];

                        <ProjectModal project={activeProject} onClose={() => setActiveProject(null)} />

    <button 
        onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })}
        className="interactive-text pointer-events-auto outline-none block mt-[2px] md:mt-[4px]"
        aria-label="Ir al inicio"
    >
        <svg 
            viewBox="0 0 540 703" 
            className="h-5 md:h-6 w-auto block fill-current" 
            xmlns="http://www.w3.org/2000/svg"
        >

    </button>

                            <div className="flex justify-between items-start border-t border-white/20 pt-4">
                                <span className="text-xs uppercase tracking-widest text-neutral-500">Portfolio</span>
                                <span className="text-xs uppercase tracking-widest text-neutral-500 text-right">Rosario, Santa Fe<br/>Argentina</span>
                            </div>

                            <div className="flex flex-col justify-center flex-grow py-12 md:py-16 relative z-20 gap-4 md:gap-0">

                                    justify="justify-start" 
                                    className="text-[15vw] leading-[0.8] font-medium tracking-tighter uppercase text-white mix-blend-difference"

                            </div>

                            <div className="flex justify-between items-end pb-8">
                                <div className="max-w-md hidden md:block">
                                    <p className="text-sm text-neutral-400 leading-relaxed"></p>
                                </div>
                                <motion.a 
                                    href="#work"
                                    animate={{ y: [0, 10, 0] }}
                                    transition={{ repeat: Infinity, duration: 2 }}
                                    className="hidden md:block text-white"

                                <span>VIBECODING — IDENTIDAD — SISTEMAS — NARRATIVA — VISUALES — DIRECCIÓN DE ARTE — VIBECODING — IDENTIDAD — SISTEMAS — NARRATIVA — VISUALES — DIRECCIÓN DE ARTE —&nbsp;</span>
                            </div>
                        </div>
                    </div>

                    <section id="work" className="relative z-10 px-4 md:px-12 py-16 md:py-32 max-w-[1920px] mx-auto">
                        <CategorySection title="Branding_" projects={identityProjects} onProjectClick={setActiveProject} />
                        <CategorySection title="Web_" projects={webProjects} onProjectClick={setActiveProject} />
                        <CategorySection title="Otros_" projects={editorialProjects} onProjectClick={setActiveProject} />
                    </section>

                    <section id="archive" className="relative z-10 px-4 md:px-12 py-12 md:py-20 bg-neutral-900/30 border-t border-neutral-800">
                        <div className="max-w-[1920px] mx-auto grid grid-cols-1 md:grid-cols-12 gap-8 md:gap-12">
                            <div className="md:col-span-4">
                                <h3 className="text-xl font-bold uppercase tracking-tight mb-4 text-white">Música y Visualidades</h3>
                                <p className="text-neutral-500 text-sm leading-relaxed max-w-sm">
                                    Diseño y dirección de artes visuales en co-labor con la escena rosarina independiente.
                                </p>
                            </div>
                            <div className="md:col-span-8">
                                <div className="grid grid-cols-1 gap-2">
                                    {musicProjects.map((item, i) => (
                                        <ArchiveItem 
                                            key={i} 
                                            item={item} 
                                            isExpanded={expandedArchiveIndex === i}
                                            onToggle={() => setExpandedArchiveIndex(expandedArchiveIndex === i ? null : i)}
                                            onImageClick={(imgUrl) => setFullscreenImage(imgUrl)}
                                        />
                                    ))}
                                </div>
                            </div>
                        </div>

                    <footer id="contact" className="relative z-10 px-4 md:px-12 py-16 md:py-32 min-h-[70vh] flex flex-col justify-between border-t border-neutral-800 bg-[#050505]">
                        <div>
                            <div className="mb-16 md:mb-32 max-w-sm">
                                <p className="text-sm text-neutral-500 leading-relaxed">
                                    Creo en una metodología de trabajo flexible y ágil. <br className="hidden md:block"/>
                                    Dinámicas a medida para cada proyecto, basado en la motivación y la cultura de proyecto.
                                </p>
                            </div>

                            <p className="text-sm uppercase tracking-widest text-neutral-500 mb-8">Trabajemos juntos</p>
                            <a href="mailto:graficojordan@gmail.com" className="project-card-trigger text-[10vw] md:text-[5.5vw] leading-[0.9] md:leading-none font-bold text-white hover:text-neutral-400 transition-colors block uppercase">
    graficojordan<br className="md:hidden" />@gmail.com
</a>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-12 mt-12 md:mt-24">
                            <div>
                                <h4 className="text-neutral-500 uppercase text-xs tracking-widest mb-4">Redes</h4>
                                <ul className="space-y-2">
                                    <li><a href="https://www.behance.net/trinch" target="_blank" rel="noopener noreferrer" className="project-card-trigger flex items-center gap-2 hover:text-white text-neutral-400 transition-colors"><Behance size={16}/> Behance</a></li>
                                    <li><a href="https://www.linkedin.com/in/jordantrinch/" target="_blank" rel="noopener noreferrer" className="project-card-trigger flex items-center gap-2 hover:text-white text-neutral-400 transition-colors"><Linkedin size={16}/> LinkedIn</a></li>
                                    <li><a href="mailto:trinchjordan@gmail.com" className="project-card-trigger flex items-center gap-2 hover:text-white text-neutral-400 transition-colors"><Mail size={16}/> Email</a></li>
                                </ul>
                            </div>
                            <div>
                                <h4 className="text-neutral-500 uppercase text-xs tracking-widest mb-4">Ubicación</h4>
                                <p className="text-neutral-400">Rosario, Santa Fe<br/>Argentina</p>
                            </div>
                            <div className="md:col-span-2 text-right flex flex-col justify-end">
                                <p className="text-neutral-600 text-sm">
                                    © 2026
                                </p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
