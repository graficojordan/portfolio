<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jordán Trinch - Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Space Grotesk"', 'sans-serif'] },
                    colors: { neutral: { 900: '#171717', 800: '#262626' } }
                }
            }
        }
    </script>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            background-color: #050505; 
            color: #e5e5e5; 
            margin: 0; 
            overflow-x: hidden;
            cursor: none; 
        }

        a, button, .interactive-trigger, .project-card-trigger {
            cursor: none !important;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }

        .marquee-container { overflow: hidden; white-space: nowrap; }
        .marquee-content { display: inline-block; animation: marquee 40s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .custom-cursor { 
            mix-blend-mode: difference; 
            pointer-events: none; 
            z-index: 9999;
            position: fixed;
            top: 0; 
            left: 0;
            background-color: white;
            border-radius: 50%;
        }

        .stroke-text {
            -webkit-text-stroke: 1.5px white; 
            color: transparent; 
            transition: all 0.3s ease;
            transform: translateZ(0);
        }
        .stroke-text:hover { 
            -webkit-text-stroke: 1.5px white; 
            color: white; 
        }

        .interactive-text { cursor: none; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spin-text { animation: spin 10s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { createRoot } = ReactDOM;
        const { motion, useScroll, useTransform, useMotionValue, useSpring } = Motion;

        const ArrowDown = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>);
        const ArrowUpRight = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M7 7h10v10"/><path d="M7 17 17 7"/></svg>);
        const Mail = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>);
        
        const Behance = ({ size = 24, className }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="currentColor" className={className}>
                <path d="M7.7 12.3h2.2c1.2 0 2.2-.6 2.2-2 0-1.1-.6-1.7-2-1.7H7.7v3.7zM7.7 15.6h2.5c1.4 0 2.5-.6 2.5-2.1 0-1.4-.9-2-2.2-2H7.7v4.1zM5.5 6.4h4.8c2.6 0 4.3 1.2 4.3 3.7 0 1.5-.8 2.6-2 3.1 1.5.4 2.7 1.4 2.7 3.5 0 2.7-2 4.1-4.8 4.1H5.5V6.4z M16.5 10.1h4.6v-1.4h-4.6v1.4zM19 14.8c-1.2 0-1.9-.6-2.1-1.6h4.6c0-2.3-1.3-3.8-3.7-3.8-2.5 0-3.9 1.7-3.9 4.3 0 2.6 1.6 4.2 4.3 4.2 2 0 3.6-1 4-2.7h-2.1c-.3.9-1.1 1.5-1.1 1.5z"/>
            </svg>
        );

        const Linkedin = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>);
        const Disc = ({ size = 24, className }) => (<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>);

        const CustomCursor = () => {
            const cursorX = useMotionValue(-100);
            const cursorY = useMotionValue(-100);
            
            const springConfig = { damping: 28, stiffness: 500, mass: 0.5 };
            const x = useSpring(cursorX, springConfig);
            const y = useSpring(cursorY, springConfig);
            
            const [isHovering, setIsHovering] = useState(false);
            const isHoveringRef = useRef(false);

            useEffect(() => {
                const moveCursor = (e) => {
                    const offset = isHoveringRef.current ? 32 : 8;
                    cursorX.set(e.clientX - offset);
                    cursorY.set(e.clientY - offset);
                };

                const handleMouseEnter = () => {
                    setIsHovering(true);
                    isHoveringRef.current = true;
                };
                
                const handleMouseLeave = () => {
                    setIsHovering(false);
                    isHoveringRef.current = false;
                };

                window.addEventListener('mousemove', moveCursor);
                
                const interactiveSelectors = 'a, button, .project-card-trigger, .archive-item, .interactive-trigger';
                
                const addListeners = () => {
                    document.querySelectorAll(interactiveSelectors).forEach(el => {
                        el.addEventListener('mouseenter', handleMouseEnter);
                        el.addEventListener('mouseleave', handleMouseLeave);
                    });
                };

                setTimeout(addListeners, 500);

                const observer = new MutationObserver(addListeners);
                observer.observe(document.body, { childList: true, subtree: true });

                return () => {
                    window.removeEventListener('mousemove', moveCursor);
                    observer.disconnect();
                };
            }, []);

            return (
                <motion.div
                    className="custom-cursor"
                    style={{ x, y }}
                    animate={{
                        width: isHovering ? 64 : 16,
                        height: isHovering ? 64 : 16,
                        opacity: 1
                    }}
                    transition={{ type: "spring", stiffness: 500, damping: 28, mass: 0.5 }}
                />
            );
        };

        const SpinningBadge = () => (
            <div className="relative w-24 h-24 md:w-32 md:h-32 flex items-center justify-center">
                <svg className="w-full h-full spin-text" viewBox="0 0 100 100">
                    <path id="circlePath" d="M 50, 50 m -37, 0 a 37,37 0 1,1 74,0 a 37,37 0 1,1 -74,0" fill="transparent" />
                    <text fill="white" fontSize="11" fontWeight="bold" letterSpacing="2">
                        <textPath href="#circlePath" startOffset="0%">
                            VISUAL DESIGN — ROSARIO — ARGENTINA —
                        </textPath>
                    </text>
                </svg>
                <ArrowDown className="absolute text-white" size={24} />
            </div>
        );

        // --- COMPONENTE DE PROYECTO INDIVIDUAL (MODAL) ---
        const ProjectModal = ({ project, onClose }) => {
            if (!project) return null;

            useEffect(() => {
                document.body.style.overflow = 'hidden';
                return () => {
                    document.body.style.overflow = '';
                };
            }, []);

            return (
                <motion.div 
                    initial={{ opacity: 0, y: 20 }}
                    animate={{ opacity: 1, y: 0 }}
                    className="fixed inset-0 z-[100] bg-[#050505] overflow-y-auto cursor-none"
                >
                    <div className="sticky top-0 w-full flex justify-end px-6 py-6 md:px-12 md:py-8 z-50 mix-blend-difference">
                        <button 
                            onClick={onClose} 
                            className="interactive-trigger text-white text-xs md:text-sm uppercase tracking-widest font-bold hover:text-neutral-400 transition-colors"
                        >
                            [ CERRAR ]
                        </button>
                    </div>

                    <div className="px-4 md:px-12 pt-12 pb-16 max-w-[1920px] mx-auto">
                        <h2 className="text-4xl md:text-8xl font-bold tracking-tighter text-white uppercase">{project.title}</h2>
                        <p className="text-sm md:text-base uppercase tracking-widest text-neutral-500 mt-2 md:mt-4">{project.category}</p>
                    </div>

                    {project.content && (
                        <div className="w-full flex flex-col">
                            <div className="w-full">
                                <img 
                                    src={project.content.images[0]} 
                                    alt={`${project.title} 1`} 
                                    className="w-full h-auto object-cover aspect-[16/9] md:aspect-[1536/640]" 
                                />
                            </div>

                            <div className="w-full px-6 py-24 md:py-32 flex justify-center bg-[#050505]">
                                <div className="max-w-3xl w-full text-left">
                                    <p className="text-neutral-300 text-lg md:text-2xl leading-relaxed font-light">
                                        {project.content.text}
                                    </p>
                                </div>
                            </div>

                            <div className="w-full flex flex-col gap-4 md:gap-8 pb-32">
                                {project.content.images.slice(1).map((img, i) => (
                                    <div key={i} className="w-full">
                                        <img 
                                            src={img} 
                                            alt={`${project.title} ${i+2}`} 
                                            loading="lazy"
                                            className="w-full h-auto object-cover aspect-[16/9] md:aspect-[1536/640]" 
                                        />
                                    </div>
                                ))}
                            </div>
                            
                            {/* Pie del modal con los dos botones */}
                            <div className="w-full flex flex-col items-center gap-6 pb-32">
                                {project.content.link && (
                                    <a 
                                        href={project.content.link}
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="interactive-trigger text-white text-sm uppercase tracking-widest hover:text-neutral-400 transition-colors border-b border-white hover:border-neutral-400 pb-1"
                                    >
                                        VER MÁS
                                    </a>
                                )}
                                <button 
                                    onClick={onClose} 
                                    className="interactive-trigger text-neutral-500 text-xs md:text-sm uppercase tracking-widest hover:text-white transition-colors border-b border-neutral-800 hover:border-white pb-1"
                                >
                                    VOLVER AL PORTFOLIO
                                </button>
                            </div>
                        </div>
                    )}
                </motion.div>
            );
        };

        const ProjectCard = ({ project, index, onClick }) => {
            // FIX: Detectamos si es Unsplash para optimizar, si no (GitHub Raw), usamos el link directo
            const imageUrl = project.image.includes('unsplash') 
                ? `${project.image}&w=800&q=80` 
                : project.image;

            return (
                <motion.div 
                    initial={{ opacity: 0, y: 50 }}
                    whileInView={{ opacity: 1, y: 0 }}
                    viewport={{ once: true }}
                    transition={{ duration: 0.6, delay: index * 0.1 }}
                    onClick={() => onClick && onClick(project)}
                    className="project-card-trigger group relative w-full aspect-[4/5] overflow-hidden bg-neutral-900 border border-neutral-900 hover:border-neutral-700 transition-colors"
                >
                    <div className="absolute inset-0 bg-black/20 group-hover:bg-transparent transition-colors duration-500 z-10"></div>
                    <img 
                        src={imageUrl} 
                        alt={project.title} 
                        loading="lazy"
                        className="w-full h-full object-cover grayscale group-hover:grayscale-0 scale-100 group-hover:scale-105 transition-all duration-700 ease-out"
                    />
                    <div className="absolute bottom-0 left-0 w-full p-6 z-20 translate-y-4 group-hover:translate-y-0 transition-transform duration-500 bg-gradient-to-t from-black/80 to-transparent">
                        <div className="flex justify-between items-end overflow-hidden">
                            <div>
                                <p className="text-xs uppercase tracking-widest text-neutral-400 mb-1">{project.category}</p>
                                <h3 className="text-2xl md:text-3xl font-bold text-white">{project.title}</h3>
                            </div>
                            <div className="opacity-0 group-hover:opacity-100 transition-opacity duration-300 transform translate-x-4 group-hover:translate-x-0 text-white">
                                <ArrowUpRight className="w-8 h-8" />
                            </div>
                        </div>
                    </div>
                </motion.div>
            );
        };

        const CategorySection = ({ title, projects, onProjectClick }) => (
            <div className="mb-16 md:mb-32 last:mb-0">
                <div className="flex items-end justify-between mb-8 md:mb-12 border-b border-neutral-800 pb-4">
                    <h2 className="text-3xl md:text-6xl font-bold tracking-tighter text-white uppercase">{title}</h2>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-8 md:gap-y-12 gap-x-8">
                    {projects.map((project, index) => (
                        <ProjectCard 
                            key={index} 
                            project={project} 
                            index={index} 
                            onClick={project.content ? onProjectClick : null} 
                        />
                    ))}
                </div>
            </div>
        );

        const ArchiveItem = ({ title, category, role }) => (
            <div className="archive-item group flex items-center justify-between py-4 border-b border-neutral-900 hover:border-neutral-700 transition-colors">
                <div className="flex items-center gap-4">
                    <div className="p-2 bg-neutral-900 rounded-full text-neutral-500 group-hover:text-white transition-colors">
                        <Disc size={16} />
                    </div>
                    <div>
                        <h4 className="text-sm font-bold text-neutral-300 group-hover:text-white transition-colors">{title}</h4>
                        <p className="text-[10px] uppercase tracking-widest text-neutral-600">{category}</p>
                    </div>
                </div>
                <span className="text-xs text-neutral-500 font-mono hidden md:block">{role}</span>
            </div>
        );

        function App() {
            const [activeProject, setActiveProject] = useState(null);

            const identityProjects = [
                { 
                    title: "MANGIA FRESCO", 
                    category: "Identidad Visual / Gastronomía", 
                    // IMAGEN DE PORTADA CORREGIDA (Sin parámetros extra)
                    image: "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-0.jpg",
                    content: {
                        link: "https://www.behance.net/gallery/192867745/Mangia-Fresco-Manual-de-marca",
                        text: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum. Pellentesque habitant morbi tristique senectus et netus et malesuada fames ac turpis egestas.",
                        images: [
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-1.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-2.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-3.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-4.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-5.jpg",
                            "https://raw.githubusercontent.com/graficojordan/portfolio-data/main/mangia-6.jpg"
                        ]
                    }
                },
                { 
                    title: "CUYACÍ", 
                    category: "Branding / Packaging", 
                    image: "https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?auto=format&fit=crop",
                    content: {
                        link: "https://www.behance.net/gallery/233285105/Cuyaci-Diseno-de-packaging",
                        text: "Lorem ipsum dolor sit amet, consectetur adipiscing elit. Integer nec odio. Praesent libero. Sed cursus ante dapibus diam. Sed nisi. Nulla quis sem at nibh elementum imperdiet. Duis sagittis ipsum. Praesent mauris. Fusce nec tellus sed augue semper porta. Mauris massa. Vestibulum lacinia arcu eget nulla. Class aptent taciti sociosqu ad litora torquent per conubia nostra, per inceptos himenaeos.",
                        images: [
                            "https://images.unsplash.com/photo-1634152962476-4b8a00e1915c?auto=format&fit=crop&w=1536&h=640&q=80",
                            "https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?auto=format&fit=crop&w=1536&h=640&q=80",
                            "https://images.unsplash.com/photo-1586023492125-27b2c045efd7?auto=format&fit=crop&w=1536&h=640&q=80",
                            "https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1536&h=640&q=80",
                            "https://images.unsplash.com/photo-1616401784845-180882ba9ba8?auto=format&fit=crop&w=1536&h=640&q=80",
                            "https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?auto=format&fit=crop&w=1536&h=640&q=80"
                        ]
                    }
                },
            ];
            
            const webProjects = [
                { title: "FORBICE", category: "Web / CORPORATIVO", image: "https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop" },
                { title: "LABCELL", category: "Web / Tecnología", image: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?auto=format&fit=crop" },
                { title: "CONTRAFUEGO", category: "Web / Portfolio", image: "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop" },
            ];
            const editorialProjects = [
                { title: "GHETTOS", category: "Diseño de Vinilo", image: "https://images.unsplash.com/photo-1544256718-3bcf237f3974?auto=format&fit=crop" },
                { title: "COSQUÍN ROCK", category: "Diseño de Información", image: "https://images.unsplash.com/photo-1459749411177-0473ef71607b?auto=format&fit=crop" },
                { title: "FANFARRÓN OXIDADO", category: "Diseño de CD", image: "https://images.unsplash.com/photo-1532012197267-da84d127e765?auto=format&fit=crop" },
                { title: "TAPAS DE DISCOS", category: "Sistemas Visuales", image: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?auto=format&fit=crop" },
            ];
            const musicProjects = [
                { title: "Sun Comes Down", category: "Videoclip — ZG", role: "Visuales" },
                { title: "Hombre Nuclear", category: "Videoclip — Portátiles Steady Club", role: "Dirección de Arte" },
                { title: "Ghettos", category: "Vinilo LP — Portátiles", role: "Packaging - Diseño de Vinilo" },
                { title: "Dualidad", category: "Arte de tapa — ZG", role: "Diseño Gráfico" },
                { title: "Debut", category: "EP — ZG", role: "Arte de tapa" },
            ];

            return (
                <div className="relative min-h-screen bg-[#050505] text-[#e5e5e5] selection:bg-white selection:text-black">
                    <CustomCursor />
                    
                    {activeProject && (
                        <ProjectModal project={activeProject} onClose={() => setActiveProject(null)} />
                    )}
                    
                    <nav className="fixed top-0 left-0 w-full z-50 px-4 py-6 md:px-12 md:py-8 flex justify-between items-start mix-blend-difference text-white">
                        <div className="flex flex-col">
                            <span className="text-xl font-bold tracking-tighter uppercase interactive-text">JT—</span>
                        </div>
                        <div className="hidden md:flex flex-col text-right gap-1 text-[10px] uppercase tracking-widest">
                            <a href="#work" className="hover:text-neutral-400 transition-colors project-card-trigger">Proyectos</a>
                            <a href="#archive" className="hover:text-neutral-400 transition-colors project-card-trigger">Visuales</a>
                            <a href="#contact" className="hover:text-neutral-400 transition-colors project-card-trigger">Contacto</a>
                        </div>
                    </nav>

                    <header className="min-h-screen w-full flex flex-col justify-center px-4 md:px-12 relative z-10 pt-28 md:pt-36 overflow-hidden">
                        <div className="max-w-[1920px] mx-auto w-full flex flex-col justify-between min-h-[70vh] md:min-h-[80vh]">
                            <div className="flex justify-between items-start border-t border-white/20 pt-4">
                                <span className="text-xs uppercase tracking-widest text-neutral-500">Portfolio 2026</span>
                                <span className="text-xs uppercase tracking-widest text-neutral-500 text-right">Rosario, Santa Fe<br/>Argentina</span>
                            </div>

                            <div className="flex flex-col justify-center flex-grow py-8 md:py-12 relative">
                                <motion.h1 
                                    initial={{ y: 100, opacity: 0 }}
                                    animate={{ y: 0, opacity: 1 }}
                                    transition={{ duration: 1, ease: [0.22, 1, 0.36, 1] }}
                                    className="text-[15vw] leading-[0.8] font-bold tracking-tighter uppercase text-white mix-blend-difference interactive-trigger"
                                >
                                    JORDÁN
                                </motion.h1>
                                
                                <div className="flex flex-col md:flex-row justify-between items-start md:items-center py-4 md:py-8 border-y border-white/10 my-4 md:my-0">
                                    <div className="flex gap-4 md:gap-8 text-xs md:text-sm uppercase tracking-widest text-neutral-400">
                                        <span>(01) Branding</span>
                                        <span>(02) Web</span>
                                        <span>(03) Visuales</span>
                                    </div>
                                    <div className="hidden md:block"><SpinningBadge /></div>
                                </div>

                                <motion.h1 
                                    initial={{ y: 100, opacity: 0 }}
                                    animate={{ y: 0, opacity: 1 }}
                                    transition={{ duration: 1, delay: 0.1, ease: [0.22, 1, 0.36, 1] }}
                                    className="text-[15vw] leading-[0.8] md:leading-[0.85] font-bold tracking-tighter uppercase text-transparent stroke-text interactive-trigger text-right pb-4 md:pb-6"
                                >
                                    TRINCH
                                </motion.h1>
                            </div>

                            <div className="flex justify-between items-end pb-8">
                                <div className="max-w-md hidden md:block">
                                    <p className="text-sm text-neutral-400 leading-relaxed">
                                        Soluciones visuales con enfoque estratégico. 
                                        Diseño para gastronomía, construcción y cultura.
                                    </p>
                                </div>
                                <motion.a 
                                    href="#work"
                                    animate={{ y: [0, 10, 0] }}
                                    transition={{ repeat: Infinity, duration: 2 }}
                                    className="hidden md:block text-white"
                                >
                                    <ArrowDown size={32} />
                                </motion.a>
                            </div>
                        </div>
                    </header>

                    <div className="w-full py-4 md:py-6 border-y border-neutral-800 bg-[#050505] relative z-20 overflow-hidden">
